# Реєстр вузлів - mapping numeric ID (як він приходить з LoRa) до людського імені.
#
# Number → label. Число вузол має "вшите" у прошивку (константа у C++-коді).
# Label збігається з ключем у thresholds.yaml і з node_id що зберігається у БД.
#
# Дії при додаванні нового вузла:
#   1. Вшити наступний доступний number у прошивку.
#   2. Додати рядок нижче: <number>: <label>.
#   3. Переконатись що label є в thresholds.yaml (інакше алерти не спрацюють).

nodes:
  0: greenhouse-1
  1: greenhouse-2
  2: greenhouse-3
