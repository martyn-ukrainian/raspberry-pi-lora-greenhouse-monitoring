# Локалізаційні мапінги для повідомлень нотифікаторів.
# Використовується будь-яким notifier-ом (Telegram, email, push тощо),
# який хоче форматувати алерт українською.
#
# Значення можна змінювати без правки коду. Формат — плоскі словники,
# щоб було легко читати й редагувати руками.

# Іконки за парою (sensor, kind).
# Ключ верхнього рівня — назва датчика (як у Measurement).
# Всередині — high (перевищення max) і low (порушення min).
icons:
  air_temperature:
    high: "🔥" # жарко
    low: "🌡️" # холодно
  air_humidity:
    high: "💦" # задушливо
    low: "🏜️" # сухе повітря
  soil_moisture:
    high: "🌊" # перелив
    low: "💧" # треба полити
  fallback: "⚠️" # для будь-якої незнайомої пари

# Українські назви датчиків для читабельного тексту.
sensor_names:
  air_temperature: "температура повітря"
  air_humidity: "вологість повітря"
  soil_moisture: "вологість ґрунту"

# Напрямок відхилення від норми.
directions:
  high: "вище"
  low: "нижче"

units:
  air_temperature: "°C"
  air_humidity: "%"
  soil_moisture: "%"
