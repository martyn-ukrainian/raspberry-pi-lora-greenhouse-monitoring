# Пороги алертів для теплиць.
# Стартові значення взято з docs/журнал.md, коригувати за сезоном на фактичних вимірах.
# Формат і логіка описані в docs/alerts.md.

# Глобальні дефолти. Можна перекрити per-sensor у блоках теплиць нижче.
defaults:
  dwell_minutes: 5 # скільки хвилин стан має триматись поза межами до алерта
  cooldown_minutes: 30 # тиша після алерта, скільки не повторювати

# Кожна теплиця має власний набір порогів.
# Дії при додаванні нової теплиці:
#   1. Скопіювати блок нижче.
#   2. Змінити node_id (ключ) і label (людське імʼя).
#   3. Виправити пороги під культуру й фізичні умови цієї теплиці.
greenhouses:
  greenhouse-1:
    label: "Розсадна (огірки)"
    air_temperature:
      min: 24.0
      max: 28.0
      dwell_minutes: 1 # температура стрибає швидко, коротша витримка
    air_humidity:
      min: 75.0
      max: 90.0
      dwell_minutes: 10
    soil_moisture:
      min: 30.0
      dwell_minutes: 20 # ґрунт інерційний, довша витримка

  greenhouse-2:
    label: "Огірки основна"
    air_temperature:
      min: 24.0
      max: 28.0
      dwell_minutes: 3
    air_humidity:
      min: 75.0
      max: 90.0
      dwell_minutes: 10
    soil_moisture:
      min: 30.0
      dwell_minutes: 20

  greenhouse-3:
    label: "Помідори"
    air_temperature:
      min: 20.0
      max: 30.0
      dwell_minutes: 3
    air_humidity:
      min: 60.0
      max: 70.0 # вище — ризик фітофтори
      dwell_minutes: 10
    soil_moisture:
      min: 25.0
      dwell_minutes: 20
